<html lang="en">
<head>

    <style>
@font-face {
  font-family: 'Roobert';
  src: url('fonts/Roobert-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Roobert';
  src: url('fonts/Roobert-SemiBold.ttf') format('truetype');
  font-weight: 600;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Recital';
  src: url('fonts/Recital-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Roobert', sans-serif;
  background: #B09A6F;
  color: #f0ebe2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  font-size: 18px;
  vertical-align: middle;
}
.page-header {
  padding: 60px 28px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 8px;
}
.page-header .logo { flex-shrink: 0; }
.page-header h1 {
  font-family: 'Recital', serif;
  font-size: 1.80rem;
  font-weight: 400;
  line-height: 1.1;
  color: #f0ebe2;
  letter-spacing: -0.01em;
}
.video-section {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 28px 0;
}
.video-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  border-radius: 8px;
  overflow: hidden;
  width: 100%;
  max-width: 1080px;
  position: relative;
}
video {
  display: block;
  width: 100%;
  max-height: 72vh;
  background: #000;
}

#custom-controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(60, 55, 48, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.12);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
  transition: opacity 0.3s;
}
#custom-controls button {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
}
#custom-controls .material-symbols-outlined {
  font-size: 22px;
  color: #FFFFFF;
}
#custom-controls .time-display {
  font-family: 'Roobert', sans-serif;
  font-size: 0.78rem;
  color: #FFFFFF;
  min-width: 90px;
}
#custom-controls .progress-bar {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}
#custom-controls .progress-fill {
  height: 100%;
  background: #FFFFFF;
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
}
#custom-controls .volume-slider {
  width: 60px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255,255,255,0.3);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
#custom-controls .volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px;
  height: 10px;
  background: #FFFFFF;
  border-radius: 50%;
}
.below-video {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 16px 28px 100px;
}
.download-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #f0ebe2;
  color: #5C3D1A;
  text-decoration: none;
  padding: 12px 18px;
  border-radius: 6px;
  font-family: 'Roobert', sans-serif;
  font-size: 0.875rem;
  font-weight: 400;
  transition: opacity 0.15s;
}
.download-btn:hover { opacity: 0.88; }
.download-btn .material-symbols-outlined {
  font-size: 16px;
  color: #5C3D1A;
}
.contact-line {
  font-size: 0.92rem;
  color: #f0ebe2;
  opacity: 0.8;
  text-align: center;
}
.contact-line a {
  color: #f0ebe2;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.contact-line a:hover { opacity: 0.85; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #a08960; }
::-webkit-scrollbar-thumb { background: #8a7550; border-radius: 3px; }
@media (max-width: 768px) {
  .page-header { padding: 40px 16px 0; }
  .page-header h1 { font-size: 1.4rem; }
  .video-section { padding: 16px 16px 0; }
  .below-video { padding: 16px 16px 60px; }
}
    </style>

        <h1>Brand Wizard Plugin Demo</h1>
    </header>
    <main class="video-section">
        <div class="video-card">
            <video preload="metadata" playsinline id="mainVideo">
                <source src="https://github.com/eGrayIF/if-brand-wizard-demo/releases/download/v1.0/IFBrandWizardClaudeDemo.mov" type="video/quicktime">
                <source src="https://github.com/eGrayIF/if-brand-wizard-demo/releases/download/v1.0/IFBrandWizardClaudeDemo.mov" type="video/mp4">
                Your browser does not support the video tag.
                <a href="https://github.com/eGrayIF/if-brand-wizard-demo/releases/download/v1.0/IFBrandWizardClaudeDemo.mov">Download the video</a>
            </video>
            <div id="custom-controls">
                <button id="playBtn"><span class="material-symbols-outlined">play_arrow</span></button>
                <span class="time-display"><span id="currentTime">0:00</span> / <span id="duration">0:00</span></span>
                <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                <button id="muteBtn"><span class="material-symbols-outlined">volume_up</span></button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">

        <a class="download-btn" href="https://github.com/eGrayIF/if-brand-wizard-demo/releases/download/v1.0/IFBrandWizardClaudeDemo.mov">
            <span class="material-symbols-outlined">download</span>
            Download Video
        </a>
        <p class="contact-line">For any questions, please reach out to <a href="mailto:egray@intlfarming.com">egray@intlfarming.com</a></p>

    <script>
    const video = document.getElementById('mainVideo');
    const playBtn = document.getElementById('playBtn');
    const muteBtn = document.getElementById('muteBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const volumeSlider = document.getElementById('volumeSlider');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');

    function fmt(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    playBtn.addEventListener('click', () => {
        if (video.paused) { video.play(); } else { video.pause(); }
    });
    video.addEventListener('play', () => {
        playBtn.querySelector('span').textContent = 'pause';
    });
    video.addEventListener('pause', () => {
        playBtn.querySelector('span').textContent = 'play_arrow';
    });
    video.addEventListener('loadedmetadata', () => {
        durationEl.textContent = fmt(video.duration);
    });
    video.addEventListener('timeupdate', () => {
        currentTimeEl.textContent = fmt(video.currentTime);
        if (video.duration) {
            progressFill.style.width = (video.currentTime / video.duration * 100) + '%';
        }
    });
    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
    });
    muteBtn.addEventListener('click', () => {
        video.muted = !video.muted;
        muteBtn.querySelector('span').textContent = video.muted ? 'volume_off' : 'volume_up';
    });
    volumeSlider.addEventListener('input', (e) => {
        video.volume = e.target.value;
    });
    fullscreenBtn.addEventListener('click', () => {
        const card = document.querySelector('.video-card');
        if (document.fullscreenElement) {
            document.exitFullscreen();
        } else {
            card.requestFullscreen();
        }
    });
    video.addEventListener('click', () => {
        if (video.paused) { video.play(); } else { video.pause(); }
    });
    </script>
